name: Codex Homunculus CI

on:
  pull_request:
    paths:
      - "plugins/codex-homunculus/**"
      - ".github/workflows/codex-homunculus-ci.yml"
  push:
    branches:
      - main
    paths:
      - "plugins/codex-homunculus/**"
      - ".github/workflows/codex-homunculus-ci.yml"

jobs:
  verify:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: plugins/codex-homunculus
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Syntax check
        run: npm run check

      - name: Smoke test
        run: npm test

      - name: Verify package
        run: npm pack --dry-run --json

      - name: Verify helper health
        run: node scripts/homunculus-helper.mjs health
