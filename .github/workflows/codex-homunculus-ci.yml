name: Codex Homunculus CI

on:
  pull_request:
    paths:
      - "plugins/codex-homunculus/**"
      - ".github/workflows/codex-homunculus-ci.yml"
  push:
    branches:
      - main
    paths:
      - "plugins/codex-homunculus/**"
      - ".github/workflows/codex-homunculus-ci.yml"

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: plugins/codex-homunculus
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify
        run: npm run ci
