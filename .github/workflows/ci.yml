name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20]

    defaults:
      run:
        working-directory: plugins/codex-homunculus

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Run CLI checks
        run: npm run ci

      - name: Verify POSIX entry points
        if: runner.os != 'Windows'
        run: |
          ./scripts/homunculus.mjs --help >/dev/null
          test -x ./scripts/pre-commit-privacy-guard

      - name: Verify PowerShell wrappers
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/codex-homunculus.ps1 --help
          ./scripts/codex-with-homunculus.ps1 --dry-run
